<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title> Rako Cyber </title>


<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f2f5;
}

#map {
  height: 100vh;
}


.popup-box {
  font-size: 14px;
  line-height: 1.4;
}
.popup-box b {
  color: #007bff;
}
.popup-box .time {
  font-size: 12px;
  color: #555;
  margin-top: 4px;
}


.leaflet-marker-icon {
  transition: transform 0.2s;
}
.leaflet-marker-icon:hover {
  transform: scale(1.3);
}
</style>
</head>
<body>

<div id="map"></div>

<script>

// ملاحظة يمكن تغيير خط طول والعرض حسب دولتك | [33.2, 44.3]
const map = L.map("map").setView([33.2, 44.3], 6);


L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);


const userIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/1077/1077114.png",
  iconSize: [32, 32],
  iconAnchor: [16, 32],
  popupAnchor: [0, -28]
});


fetch("users.json")
  .then(r => r.json())
  .then(users => {
    users.forEach(u => {

      L.marker([u.lat, u.lon], { icon: userIcon })
        .addTo(map)
        .bindPopup(`
          <div class="popup-box">
            <b>📍 المدينة:</b> ${u.city || "غير معروفة"}<br>
            <b>🌐 المزود:</b> ${u.org}<br>
            <b>🗺️ الإحداثيات:</b> ${u.lat.toFixed(3)}, ${u.lon.toFixed(3)}<br>
            <div class="time">⏰ ${u.time}</div>
          </div>
        `);
    });
  });
</script>

</body>
</html>
